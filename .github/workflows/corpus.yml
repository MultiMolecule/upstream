name: corpus

on:
  push:
    paths:
      - ".github/workflows/corpus.yml"
      - "_corpus/**"
      - "requirements.txt"
  pull_request:
    paths:
      - ".github/workflows/corpus.yml"
      - "_corpus/**"
      - "requirements.txt"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python _corpus/load.py --check-all
